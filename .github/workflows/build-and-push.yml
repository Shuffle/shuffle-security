name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Shuffle API URL'
        required: false
        default: 'https://shuffler.io'

env:
  REGISTRY: ghcr.io
  # Pinned so the published image always matches docker-compose.yml,
  # regardless of the GitHub org / repo casing.
  IMAGE_NAME: shuffle/shuffle-security

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SHUFFLE_API_URL=${{ inputs.api_url || 'https://shuffler.io' }}
